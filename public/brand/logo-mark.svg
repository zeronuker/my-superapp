<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="ClaudeBorne">
  <defs>
    <linearGradient id="cb-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3FE0C5"></stop>
      <stop offset="55%" stop-color="#3B8DFF"></stop>
      <stop offset="100%" stop-color="#5B6BFF"></stop>
    </linearGradient>
  </defs>
  <style>
    .c-letter {
      font-family: system-ui, sans-serif;
      font-size: 58px;
      font-weight: 700;
      fill: url(#cb-grad);
    }
  </style>
  <!-- Dark background so iOS doesn't show orange behind transparent icon -->
  <rect width="100" height="100" fill="#0a1020"/>
  <!-- Frame inset to safe zone (~15 units from edges) so squircle mask doesn't clip it -->
  <polyline points="15,28 15,15 85,15 85,85 50,85" fill="none" stroke="url(#cb-grad)" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"></polyline>
  <text class="c-letter" x="50" y="72" text-anchor="middle">C</text>
</svg>

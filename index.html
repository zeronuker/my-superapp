<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ClaudeBorne · brand head ---------------------------------------- -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Theme color: status bar + PWA chrome -->
    <meta name="theme-color" content="#0a1020" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="C·B SuperApp" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/brand/logo-mark.svg" />
    <link rel="icon" type="image/png" sizes="32x32"  href="/brand/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16"  href="/brand/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/icons/apple-touch-icon-180.png" />

    <!-- Brand stylesheet: fonts, tokens, components -->
    <link rel="stylesheet" href="/brand/brand.css" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/brand/manifest.webmanifest" />

    <!-- Restore saved theme before first paint — prevents flash -->
    <script>(function(){var s=localStorage.getItem('cb-theme');if(s)document.documentElement.setAttribute('data-theme',s);})()</script>

    <meta name="description" content="Multi-function calculator for pilots with EDTO calculator, scientific, time, currency, and interpolation tools." />
    <title>ClaudeBorne · SUPERAPP</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
